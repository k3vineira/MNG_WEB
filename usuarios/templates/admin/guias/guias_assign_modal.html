{% if guia_sel %}
  <div class="modal fade show" id="modalAsignar{{ guia_sel.id }}" tabindex="-1" style="display: block; background-color: rgba(0,0,0,0.5);" aria-modal="true" role="dialog">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content shadow-lg border-0">
        <form action="{% url 'asignar_tour_guia' guia_sel.id %}" method="POST">
          {% csrf_token %}
          <div class="modal-header bg-success text-white">
            <h5 class="modal-title"><i class="bi bi-calendar-check me-2"></i>Asignar Tour a {{ guia_sel.nombre }}</h5>
            <a href="{% url 'gestion_guias' %}" class="btn-close btn-close-white" aria-label="Close"></a>
          </div>
          <div class="modal-body p-4 bg-light text-start">
            <div class="mb-3">
              <label class="form-label fw-bold text-success">Seleccionar Paquete</label>
              <select name="paquete_id" class="form-select shadow-sm" required>
                <option value="">Destinos de Monagua...</option>
                {% for paquete in paquetes_disponibles %}
                  <option value="{{ paquete.id }}">{{ paquete.nombre }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="mb-0">
              <label class="form-label fw-bold text-success">Fecha del Tour</label>
              <input type="date" name="fecha_servicio" class="form-control shadow-sm" required />
            </div>
          </div>
          <div class="modal-footer bg-light border-0">
            <a href="{% url 'gestion_guias' %}" class="btn btn-secondary">Cancelar</a>
            <button type="submit" class="btn btn-success px-4">Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </div>
{% endif %}

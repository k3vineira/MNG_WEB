{% load static %}

<!-- SIDEBAR -->
<aside id="mainSidebar"
       class="d-flex flex-column bg-dark text-white position-fixed top-0 start-0 h-100"
       style="width:240px;z-index:1040;overflow-y:auto;transition:transform .3s">

  <!-- Brand -->
  <a href="/" class="d-flex align-items-center gap-2 p-3 text-decoration-none border-bottom border-secondary">
    <img src="{% static 'img/logo_monagua.png' %}" alt="Logo"
         class="rounded-circle border border-success flex-shrink-0"
         width="40" height="40" style="object-fit:cover">
    <div>
      <div class="fw-bold text-white small" style="letter-spacing:1px">MONAGUA</div>
      <div class="text-success" style="font-size:.65rem;letter-spacing:2px;text-transform:uppercase">Admin Panel</div>
    </div>
  </a>

  <!-- Nav -->
  <nav class="flex-grow-1 py-2">

    <div class="text-uppercase text-secondary fw-semibold px-3 py-1" style="font-size:.65rem;letter-spacing:.1em">Principal</div>

    <a href="{% url 'administrador' %}"
       class="d-flex align-items-center gap-2 px-3 py-2 text-decoration-none text-white-50 rounded mx-2 mb-1
              {% if request.resolver_match.url_name == 'administrador' %}bg-success text-white{% endif %}
              link-light">
      <i class="bi bi-grid-1x2-fill"></i> Dashboard
    </a>

    <a href="#"
       class="d-flex align-items-center gap-2 px-3 py-2 text-decoration-none text-white-50 rounded mx-2 mb-1">
      <i class="bi bi-graph-up-arrow"></i> Estadísticas
    </a>

    <a href="{% url 'comentarios' %}"
       class="d-flex align-items-center gap-2 px-3 py-2 text-decoration-none text-white-50 rounded mx-2 mb-1
              {% if request.resolver_match.url_name == 'comentarios' %}bg-success text-white{% endif %}">
      <i class="bi bi-chat-left-dots-fill"></i> Comentarios
    </a>

    <div class="text-uppercase text-secondary fw-semibold px-3 py-1 mt-2" style="font-size:.65rem;letter-spacing:.1em">Gestión</div>

    <a href="{% url 'admin_paquetes' %}"
       class="d-flex align-items-center gap-2 px-3 py-2 text-decoration-none text-white-50 rounded mx-2 mb-1
              {% if request.resolver_match.url_name == 'admin_paquetes' %}bg-success text-white{% endif %}">
      <i class="bi bi-box-seam-fill"></i> Paquetes Turísticos
    </a>

    <a href="{% url 'admin_blog' %}"
       class="d-flex align-items-center gap-2 px-3 py-2 text-decoration-none text-white-50 rounded mx-2 mb-1
              {% if request.resolver_match.url_name == 'admin_blog' %}bg-success text-white{% endif %}">
      <i class="bi bi-journal-text"></i> Blog
    </a>

    <a href="{% url 'admin_categorias' %}"
       class="d-flex align-items-center gap-2 px-3 py-2 text-decoration-none text-white-50 rounded mx-2 mb-1
              {% if request.resolver_match.url_name == 'admin_categorias' %}bg-success text-white{% endif %}">
      <i class="bi bi-tags-fill"></i> Categorías
    </a>

    <a href="{% url 'admin_actividades' %}"
       class="d-flex align-items-center gap-2 px-3 py-2 text-decoration-none text-white-50 rounded mx-2 mb-1
              {% if request.resolver_match.url_name == 'admin_actividades' %}bg-success text-white{% endif %}">
      <i class="bi bi-bicycle"></i> Actividades
    </a>

    <a href="{% url listar_reservas %}"
       class="d-flex align-items-center gap-2 px-3 py-2 text-decoration-none text-white-50 rounded mx-2 mb-1
              {% if request.resolver_match.url_name == listar_reservas %}bg-success text-white{% endif %}">
      <i class="bi bi-calendar-check-fill"></i> Reservas
    </a>

    <a href="{% url 'lista_pqrs' %}"
       class="d-flex align-items-center gap-2 px-3 py-2 text-decoration-none text-white-50 rounded mx-2 mb-1
              {% if request.resolver_match.url_name == 'lista_pqrs' %}bg-success text-white{% endif %}">
      <i class="bi bi-envelope-fill"></i> PQRS
    </a>

    <a href="{% url 'gestion_usuarios' %}"
       class="d-flex align-items-center gap-2 px-3 py-2 text-decoration-none text-white-50 rounded mx-2 mb-1
              {% if request.resolver_match.url_name == 'gestion_usuarios' %}bg-success text-white{% endif %}">
      <i class="bi bi-people-fill"></i> Guías y Usuarios
    </a>

    <a href="{% url 'gestion_promociones' %}"
       class="d-flex align-items-center gap-2 px-3 py-2 text-decoration-none text-white-50 rounded mx-2 mb-1
              {% if 'promociones' in request.path %}bg-success text-white{% endif %}">
      <i class="bi bi-megaphone-fill"></i> Promociones
    </a>

    <div class="text-uppercase text-secondary fw-semibold px-3 py-1 mt-2" style="font-size:.65rem;letter-spacing:.1em">Sistema</div>

    <a href="#"
       class="d-flex align-items-center gap-2 px-3 py-2 text-decoration-none text-white-50 rounded mx-2 mb-1">
      <i class="bi bi-bell-fill"></i> Notificaciones
    </a>

    <a href="#"
       class="d-flex align-items-center gap-2 px-3 py-2 text-decoration-none text-white-50 rounded mx-2 mb-1">
      <i class="bi bi-gear-fill"></i> Configuración
    </a>

  </nav>

  <!-- Footer -->
  <div class="p-3 border-top border-secondary">
    <div class="d-flex align-items-center gap-2 mb-2">
      <img src="{% if user.imagen_perfil %}{{ user.imagen_perfil.url }}{% else %}{% static 'img/avatar_pred.png' %}{% endif %}"
           alt="{{ user.first_name|default:'Admin' }}"
           class="rounded-circle border border-success flex-shrink-0"
           width="34" height="34" style="object-fit:cover">
      <div>
        <div class="fw-semibold text-white small">{{ user.first_name|default:'Administrador' }}</div>
        <div class="text-success" style="font-size:.7rem">Super Admin</div>
      </div>
    </div>
    <form action="{% url 'logout_usuario' %}" method="post">
      {% csrf_token %}
      <button type="submit" class="btn btn-outline-danger btn-sm w-100">
        <i class="bi bi-power"></i> Cerrar Sesión
      </button>
    </form>
  </div>

</aside>

{% extends "base.html" %}
{% load static %}

{% block content %}
<section class="vh-100 d-flex align-items-center bg-light">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-5 col-xl-4 text-center">
                <div class="card border-0 shadow-lg rounded-5 overflow-hidden animate__animated animate__fadeIn">
                    <div class="card-body p-4 p-md-5">
                        <div class="d-flex justify-content-end mb-4">
                            <span class="badge rounded-pill bg-success bg-opacity-10 text-success px-3 py-2 x-small fw-bolder">
                                VERIFICACIÓN · 02/03
                            </span>
                        </div>

                        <div class="mb-4 position-relative">
                            <div class="bg-light d-inline-block p-4 rounded-circle mb-2">
                                <i class="bi bi-send-check text-success display-4"></i>
                            </div>
                        </div>
                        
                        <h2 class="h4 fw-bold text-dark mb-3">¡Correo enviado!</h2>
                        <p class="text-muted small mb-4 px-2">
                            Revisa tu bandeja de entrada. Te hemos enviado las instrucciones para crear tu nueva contraseña.
                        </p>
                        <div class="alert alert-light border-0 small py-3 rounded-4 mb-4 bg-light shadow-sm">
                            <i class="bi bi-info-circle-fill text-muted me-2"></i> Si no aparece, revisa tu carpeta de <strong>spam</strong>.
                        </div>
                        <div class="d-grid">
                            <a href="{% url 'usuarios:login' %}" class="btn btn-success rounded-pill py-3 fw-bold shadow-sm hover-lift">
                                Volver al Inicio
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}

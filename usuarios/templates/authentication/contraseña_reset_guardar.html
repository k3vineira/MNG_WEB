{% extends "base.html" %}
{% load static %}

{% block content %}
<section class="vh-100 d-flex align-items-center bg-light">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-5 col-xl-4 text-center">
                <div class="card border-0 shadow-lg rounded-5 overflow-hidden bg-white animate__animated animate__zoomIn">
                    <div class="card-body p-4 p-md-5">
                        <div class="mb-4 text-success">
                            <div class="bg-success bg-opacity-10 d-inline-block p-4 rounded-circle mb-2">
                                <i class="bi bi-shield-check text-success display-2"></i>
                            </div>
                        </div>
                        
                        <h2 class="h3 fw-bold text-dark mb-3">¡Todo listo!</h2>
                        <p class="text-muted small mb-5">
                            Tu cuenta está segura de nuevo. Ya puedes iniciar sesión y seguir explorando con nosotros.
                        </p>
                        <div class="d-grid">
                            <a href="{% url 'usuarios:login' %}" class="btn btn-success rounded-pill py-3 fw-bold shadow-sm hover-lift">
                                Iniciar Sesión Ahora
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}

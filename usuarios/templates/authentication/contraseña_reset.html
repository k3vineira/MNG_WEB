{% extends "base.html" %}
{% load static %}
{% load crispy_forms_tags %}

{% block content %}
<section class="vh-100 d-flex align-items-center bg-light">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-5 col-xl-4">
                <div class="card border-0 shadow-lg rounded-5 overflow-hidden border-top border-success border-5 animate__animated animate__fadeIn">
                    <div class="card-body p-4 p-md-5">
                        <!-- Header Editorial -->
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <img src="{% static 'img/Logo.png' %}" alt="Logo" width="45">
                            <span class="badge rounded-pill bg-success bg-opacity-10 text-success px-3 py-2 x-small fw-bolder">
                                SOLICITUD · 01/03
                            </span>
                        </div>

                        <div class="mb-4 text-center">
                            <div class="bg-success bg-opacity-10 d-inline-block p-3 rounded-circle mb-3">
                                <i class="bi bi-shield-lock-fill text-success fs-3"></i>
                            </div>
                            <h1 class="h3 fw-bold text-dark mb-2">Recuperar acceso</h1>
                            <p class="text-muted small px-lg-3">Ingresa tu correo para recibir un enlace seguro de restauración.</p>
                        </div>

                        <form method="post" class="needs-validation">
                            {% csrf_token %}
                            <div class="mb-3">
                                {{ form|crispy }}
                            </div>
                            <div class="d-grid pt-2">
                                <button type="submit" class="btn btn-success rounded-pill py-3 fw-bold shadow-sm transition-all hover-lift">
                                    Enviar Enlace de Recuperación
                                </button>
                            </div>
                        </form>

                        <div class="text-center mt-4 pt-2 border-top">
                            <p class="small text-muted mb-0">¿Recordaste tu contraseña? 
                                <a href="{% url 'usuarios:login' %}" class="text-success fw-bold text-decoration-none ms-1 link-offset-2 link-underline-opacity-25 link-underline-opacity-100-hover">Regresar al Login</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}

{% load static %}
<div class="sidebar-monagua bg-success">
    <div class="sidebar-logo text-center mb-4">
        <img src="{% static 'img/logo_monagua.png' %}" alt="Monagua" width="60">
        <h5 class="text-white mt-3 fw-bold mb-0">MONAGUA</h5>
        <small class="text-white-50 text-uppercase" style="letter-spacing: 2px; font-size: 0.65rem;">Privado</small>
    </div>

    <nav class="nav flex-column nav-sidebar mt-4">
        <a href="/" class="nav-link">
            <i class="bi bi-house"></i> Inicio
        </a>
        <a href="{% url 'usuarios:dashboard' %}" class="nav-link {% if 'dashboard' in request.resolver_match.url_name %}active{% endif %}">
            <i class="bi bi-grid"></i> Dashboard
        </a>
        <a href="{% url 'pagos:mis_pagos' %}" class="nav-link {% if 'mis_pagos' in request.resolver_match.url_name %}active{% endif %}">
            <i class="bi bi-calendar-check"></i> Mis Reservas
        </a>
        <a href="{% url 'comentarios' %}" class="nav-link {% if 'comentarios' in request.resolver_match.url_name %}active{% endif %}">
            <i class="bi bi-chat-left-text"></i> Mis Reseñas
        </a>
        <a href="{% url 'usuarios:detalles' %}" class="nav-link {% if 'detalles' in request.resolver_match.url_name %}active{% endif %}">
            <i class="bi bi-person"></i> Mi Perfil
        </a>
        <hr class="border-white-50 my-4">
        <form action="{% url 'usuarios:logout' %}" method="post" class="px-2">
            {% csrf_token %}
            <button type="submit" class="btn btn-outline-danger btn-sm w-100 rounded-pill">
                <i class="bi bi-power me-2"></i> Cerrar Sesión
            </button>
        </form>
    </nav>
</div>

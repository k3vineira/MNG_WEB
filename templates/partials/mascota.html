{% load static %}
<!-- ── Mascot: Cóndy El Cóndor ── -->
<div id="condor-mascot-container" class="position-fixed u-style-18bda3ad">
    <!-- Toggle Button (para colapsar/desplegar) -->
    <button id="condor-toggle-btn" class="btn btn-success d-flex align-items-center justify-content-center shadow-sm border border-light u-style-564e6dec">
        <i id="condor-toggle-icon" class="bi bi-chevron-left u-style-4d60b53b"></i>
    </button>

    <!-- Speech bubble -->
    <div id="condor-speech-bubble" class="bg-dark text-white rounded-4 p-3 shadow-lg border border-success position-absolute d-none u-style-f3a952ae">
        <div class="fw-bold text-success mb-1">¡Cóndy dice! 🦅</div>
        <span id="condor-speech-text">¡Hola! Soy Cóndy, tu guía en {{ site_name|default:"Monagua" }}. ¡Cuidemos el páramo juntos!</span>
        <!-- Small arrow at the bottom of speech bubble -->
        <div class="position-absolute u-style-e1a29e34"></div>
    </div>
    
    <!-- Condor Mascot Image -->
    <div class="condor-avatar-wrapper position-relative">
        <img id="condor-img" src="{% static 'img/mascota/condor0.webp' %}" alt="Cóndor Mascot" width="100" height="100" class="transition-all u-style-3f1695a1">
        <!-- Label badge -->
        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-success border border-light shadow-sm u-style-e57d4d0e">
            Cóndy
        </span>
    </div>
</div>
<script src="{% static 'js/mascota.js' %}" defer></script>

<style>
#condor-mascot-container {
    bottom: 30px;
    left: 30px;
    z-index: 1060;
    transition: transform 0.4s ease, opacity 0.4s ease !important;
}

#condor-img {
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
#condor-img:hover {
    transform: scale(1.2) rotate(8deg);
}
.condor-bounce {
    animation: condorBounce 2.5s infinite ease-in-out;
}
@keyframes condorBounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
}

#condor-mascot-container.collapsed {
    transform: translateX(-110px) !important;
    opacity: 0.6;
}

#condor-mascot-container.collapsed #condor-toggle-icon {
    transform: rotate(180deg);
}

#condor-mascot-container.collapsed #condor-speech-bubble {
    display: none !important;
}

#condor-toggle-btn {
    position: absolute;
    right: -25px;
    top: 50%;
    transform: translateY(-50%);
    width: 30px;
    height: 30px;
    border-radius: 50%;
    z-index: 10;
}

#condor-speech-bubble {
    bottom: 120px;
    left: 50%;
    transform: translateX(-50%);
    width: 250px;
    z-index: 11;
}

#condor-speech-bubble .position-absolute {
    bottom: -10px;
    left: 50%;
    transform: translateX(-50%);
    border-width: 10px 10px 0;
    border-style: solid;
    border-color: #198754 transparent transparent transparent;
}
</style>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const mascot = document.getElementById('condor-mascot-container');
    const bubble = document.getElementById('condor-speech-bubble');
    const text = document.getElementById('condor-speech-text');
    const img = document.getElementById('condor-img');
    const toggleBtn = document.getElementById('condor-toggle-btn');
    
    const tips = [
        "¡Hola! Soy Cóndy, tu guía en Monagua. ¡Exploremos el Páramo de Mongua juntos!",
        "¡No dejes basura en los senderos! Mantengamos el páramo limpio.",
        "¡Lleva siempre ropa abrigada e impermeable! El clima del páramo cambia rápido.",
        "¡El cóndor andino es el rey de los Andes! ¿Sabías que está en peligro de extinción?",
        "¡Sigue siempre el sendero demarcado para proteger los frailejones!",
        "¡Si tienes dudas sobre tus reservas, escríbenos a través de las PQRS!",
        "¿Sabías que la Laguna Negra es un sitio sagrado lleno de leyendas?",
        "¡El agua del páramo es vida! Respeta las fuentes hídricas naturales.",
        "Planifica tu visita con guías autorizados en nuestra pestaña de Guías y Usuarios."
    ];
    
    // Activate bouncing animation
    img.classList.add('condor-bounce');
    
    // Start collapsed on mobile devices
    if (window.innerWidth <= 768) {
        mascot.classList.add('collapsed');
    }

    // Toggle button handler
    toggleBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        mascot.classList.toggle('collapsed');
        bubble.classList.add('d-none');
        img.classList.add('condor-bounce');
    });
    
    mascot.addEventListener('click', function(e) {
        e.stopPropagation();
        
        // If collapsed, clicking the mascot expands it instead of showing speech bubble
        if (mascot.classList.contains('collapsed')) {
            mascot.classList.remove('collapsed');
            return;
        }

        if (bubble.classList.contains('d-none')) {
            // Pick a random tip
            const randomTip = tips[Math.floor(Math.random() * tips.length)];
            text.textContent = randomTip;
            bubble.classList.remove('d-none');
            img.classList.remove('condor-bounce');
        } else {
            bubble.classList.add('d-none');
            img.classList.add('condor-bounce');
        }
    });
    
    // Close bubble when clicking anywhere else
    document.addEventListener('click', function() {
        bubble.classList.add('d-none');
        img.classList.add('condor-bounce');
    });
});
</script>

<!-- ── base-turista (dashboard layout) ── -->
{% load static %}

<head>

  <title>{% block title %}Panel Viajero | Monagua{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" >
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
  {% block extra_head %}{% endblock %}
  
</head>
<body class="bg-light" style="font-family:'Poppins',sans-serif">

<!-- ── Botón hamburguesa (solo móvil) ── -->
<button id="sidebar-toggle"
        class="btn btn-success position-fixed d-lg-none"
        style="top:12px;left:12px;z-index:1045;width:42px;height:42px;border-radius:10px;padding:0;display:flex;align-items:center;justify-content:center"
        aria-label="Abrir menú" aria-expanded="false" aria-controls="mainSidebar">
  <i class="bi bi-list fs-5"></i>
</button>

<!-- ── Overlay móvil ── -->
<div id="sidebar-overlay"
     class="position-fixed top-0 start-0 w-100 h-100 d-none"
     style="background:rgba(0,0,0,.5);z-index:1039"></div>

<!-- ══════════════ SIDEBAR ══════════════ -->
{% include 'partials/aside-turista.html' %}

{% include 'partials/accesibilidad.html' %}

<!-- ══════════════ CONTENIDO PRINCIPAL ══════════════ -->
<main id="mainContent" class="p-4">
  {% block content %}{% endblock %}
</main>

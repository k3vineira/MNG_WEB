<form method="POST" action="">
  {% csrf_token %}

  <!-- Badge de paso -->
  <div class="d-flex align-items-center gap-2 mb-4">
    <span class="badge bg-success rounded-pill px-3 py-2 small">Paso único</span>
    <span class="text-muted small">Verifica tu identidad</span>
  </div>

  <!-- Input Correo -->
  <div class="mb-4">
    <label for="email_apodo" class="form-label small fw-semibold text-secondary mb-2">
      Correo electrónico
    </label>
    <div class="input-group">
      <span class="input-group-text bg-light border-end-0 rounded-start-3">
        <i class="bi bi-envelope text-success"></i>
      </span>
      <input
        type="email"
        id="email_apodo"
        name="email"
        class="form-control border-start-0 bg-light rounded-end-3 shadow-none py-3"
        placeholder="ejemploMongua@gmail.com"
        autofocus
        {% if request.POST.email %}value="{{ request.POST.email }}"{% endif %}
      >
    </div>
  </div>

  <!-- Input Número de Documento -->
  <div class="mb-4">
    <label for="documento_apodo" class="form-label small fw-semibold text-secondary mb-2">
      Número de documento
    </label>
    <div class="input-group">
      <span class="input-group-text bg-light border-end-0 rounded-start-3">
        <i class="bi bi-card-text text-success"></i>
      </span>
      <input
        type="text"
        id="documento_apodo"
        name="numero_documento"
        class="form-control border-start-0 bg-light rounded-end-3 shadow-none py-3"
        placeholder="Tu número de documento"
        {% if request.POST.numero_documento %}value="{{ request.POST.numero_documento }}"{% endif %}
      >
    </div>
    <div class="form-text ps-1">
      <i class="bi bi-info-circle me-1"></i>
      Usa los datos con los que te registraste en Monagua (debes ingresar al menos un dato).
    </div>
  </div>

  <!-- Botón -->
  <div class="d-grid mb-3">
    <button type="submit" id="btn_buscar_apodo" class="btn btn-success fw-bold py-3 rounded-3 shadow-sm">
      <i class="bi bi-search me-2"></i>Buscar mi apodo
    </button>
  </div>

  <!-- Volver -->
  <div class="text-center">
    <a href="{% url 'password_reset' %}" class="btn btn-link text-muted text-decoration-none small fw-semibold">
      <i class="bi bi-arrow-left me-1"></i>Volver a recuperar contraseña
    </a>
  </div>
</form>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    const form = document.querySelector('form');
    const btn = document.getElementById('btn_buscar_apodo');
    const emailInput = document.getElementById('email_apodo');
    const docInput = document.getElementById('documento_apodo');

    if (form && btn) {
      form.addEventListener('submit', function (e) {
        if (!emailInput.value.trim() && !docInput.value.trim()) {
          e.preventDefault();
          alert('Por favor ingresa tu correo electrónico o tu número de documento.');
          return false;
        }
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status"></span>Buscando...';
      });
    }
  });
</script>

{% extends 'admin/base-admin.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-5">
            <div class="card shadow-sm border-0 rounded-3">
                
                <div class="card-header text-white text-center py-3" style="background-color: var(--verde-oscuro);">
                    <h5 class="mb-0 fs-6 fw-bold text-uppercase">
                        <i class="bi bi-pencil-square me-2"></i>Modificar Tarifas
                    </h5>
                    <small class="text-white-50">Paquete: {{ object.paquete.nombre }}</small>
                </div>

                <div class="card-body p-4">
                    <form method="POST" class="row g-3">
                        {% csrf_token %}
                        
                        {% for field in form %}
                            <div class="col-12 {% if field.name == 'precio_adulto' or field.name == 'precio_menor' %}col-md-6{% endif %}">
                                <label class="form-label text-secondary small fw-bold">{{ field.label }}</label>
                                {{ field }}
                            </div>
                        {% endfor %}

                        <hr class="my-4 opacity-25">

                        <div class="col-12 d-flex justify-content-center gap-3">
                            <a href="{% url 'listar_tarifas' %}" class="btn btn-outline-secondary px-4 rounded-pill">
                                Cancelar
                            </a>
                            <button type="submit" class="btn text-white px-4 rounded-pill" style="background-color: var(--verde-oscuro); color: white;">
                                Guardar cambios
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% extends 'admin/base-admin.html' %}

{% block content %}
<div class="container mt-4 d-flex justify-content-center">
    <div class="card border-0 shadow-sm w-100" style="border-radius: 10px; max-width: 600px;">
        <div class="card-header text-white text-center py-3" style="background-color: var(--verde-oscuro, #0f5132);">
            <h5 class="mb-0 text-white fw-bold"><i class="bi bi-pencil-square"></i> Modificar Valores de Tarifa</h5>
            <small class="text-white-50">Paquete: {{ object.paquete.nombre }}</small>
        </div>
        <div class="card-body p-4">
            <form method="POST" class="row g-3">
                {% csrf_token %}
                
                <div class="col-12">
                    <label class="form-label text-secondary small fw-bold">Temporada</label>
                    {{ form.temporada }}
                </div>

                <div class="col-md-6">
                    <label class="form-label text-secondary small fw-bold">Precio Adulto ($)</label>
                    {{ form.precio_adulto }}
                </div>

                <div class="col-md-6">
                    <label class="form-label text-secondary small fw-bold">Precio Menor ($)</label>
                    {{ form.precio_menor }}
                </div>

                <div class="col-12 d-flex justify-content-end gap-2 mt-4 border-top pt-3">
                    <a href="{% url 'listar_tarifas' %}" class="btn btn-secondary fw-bold btn-sm px-3">Cancelar</a>
                    <button type="submit" class="btn btn-success fw-bold btn-sm px-4" style="background-color: var(--verde-oscuro, #0f5132);">Actualizar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        document.getElementsByName('temporada')[0]?.classList.add('form-select');
        document.getElementsByName('precio_adulto')[0]?.classList.add('form-control');
        document.getElementsByName('precio_menor')[0]?.classList.add('form-control');
    });
</script>
{% endblock %}

{% extends "admin/base-admin.html" %}
{% load static %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            
            <!-- Botón Volver -->
            <a href="{% url 'listar_reservas' %}" class="btn btn-sm btn-outline-secondary rounded-pill px-3 mb-4 fw-semibold shadow-sm">
                <i class="bi bi-arrow-left me-1"></i> Volver a Reservas
            </a>

            <div class="card border-0 shadow rounded-4 overflow-hidden bg-white">
                
                <div class="card-header bg-success text-white py-3 border-0 text-center">
                    <h5 class="mb-0 fw-bold text-uppercase u-style-e2eb0d8e">
                        <i class="bi bi-plus-circle me-2"></i>Nueva Reserva
                    </h5>
                </div>
                
                <div class="card-body p-4">
                    <form method="POST">
                        {% csrf_token %}
                        
                        <div class="mb-4 text-dark">
                            {{ form|crispy }}
                        </div>
                        
                        <div class="row g-2 pt-2 border-top">
                            <div class="col-6">
                                <a href="{% url 'listar_reservas' %}" class="btn btn-outline-secondary rounded-pill w-100 py-2 fw-semibold">
                                    Cancelar
                                </a>
                            </div>
                            <div class="col-6">
                                <button type="submit" class="btn btn-success rounded-pill w-100 py-2 fw-bold shadow-sm">
                                    Confirmar Reserva
                                </button>
                            </div>
                        </div>
                    </form>
                </div>

            </div>
        </div>
    </div>
</div>
{% endblock content %}

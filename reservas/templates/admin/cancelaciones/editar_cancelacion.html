{% extends 'base-admin.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-5">
            <div class="card shadow-sm border-0">
                
                <div class="card-header text-white text-center" style="background-color: #004d40;">
                    <h5 class="mb-0 fs-6 fw-bold text-uppercase">
                        <i class="bi bi-pencil-square me-2"></i>Editar Cancelación
                    </h5>
                </div>

                <div class="card-body p-4">
                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                        
                        <div class="small text-dark">
                            {{ form.as_p }}
                        </div>

                        <div class="d-grid gap-2">
                            <a href="{% url 'administrar_cancelaciones' %}" class="btn btn-light btn-sm border px-4 text-white" style="background-color: #004d40;">Cancelar</a>
                            <button type="submit" class="btn btn-light btn-sm border px-4 text-white" style="background-color: #004d40;">Guardar cambios</button>
                        </div> </form> </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
